# Simple Traefik Ingress for k3s
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nepai-ingress
  namespace: nepai
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: nepai.pulami.co.uk
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: nepai-backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nepai-frontend
            port:
              number: 80
