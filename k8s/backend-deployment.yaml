apiVersion: apps/v1
kind: Deployment
metadata:
  name: nepai-backend
  namespace: nepai
  labels:
    app: nepai-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nepai-backend
  template:
    metadata:
      labels:
        app: nepai-backend
    spec:
      containers:
      - name: backend
        image: pulami/nepai-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: mongodb-uri
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
