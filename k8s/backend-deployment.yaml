apiVersion: apps/v1
kind: Deployment
metadata:
  name: nepai-backend
  namespace: nepai
  labels:
    app: nepai-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nepai-backend
  template:
    metadata:
      labels:
        app: nepai-backend
    spec:
      containers:
      - name: backend
        image: pulami/nepai-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: FRONTEND_URL
          value: "https://nepai.pulami.co.uk"
        - name: BACKEND_URL
          value: "https://nepai.pulami.co.uk"
        - name: GOOGLE_CALLBACK_URL
          value: "https://nepai.pulami.co.uk/api/auth/google/callback"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: mongodb-uri
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: openai-api-key
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: session-secret
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: google-client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: google-client-secret
        - name: MAILTRAP_USER
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: mailtrap-user
        - name: MAILTRAP_PASS
          valueFrom:
            secretKeyRef:
              name: nepai-secrets
              key: mailtrap-pass
        - name: MAILTRAP_HOST
          value: "smtp.mailtrap.io"
        - name: MAILTRAP_PORT
          value: "2525"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
