apiVersion: v1
kind: Secret
metadata:
  name: nepai-secrets
  namespace: nepai
type: Opaque
stringData:
  mongodb-uri: ""
  openai-api-key: ""
  # Google OAuth
  google-client-id: ""
  google-client-secret: ""
  # Session Secret (generate a new one for production!)
  session-secret: "CHANGE-THIS-TO-A-RANDOM-SECRET-STRING"
  # Mailtrap (or your email service)
  mailtrap-user: "your-mailtrap-username"
  mailtrap-pass: "your-mailtrap-password"
