name: Deploy NepAI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: cd ~/NepAI && git pull

      - name: Install dependencies
        run: cd ~/NepAI && npm install

      - name: Build app
        run: cd ~/NepAI && npm run build

      - name: Restart app (PM2)
        run: cd ~/NepAI && pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js && pm2 save