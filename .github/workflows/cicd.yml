name: NepAI CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: [self-hosted]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          cd backend
          docker build -t pulami/nepai-backend:latest .
          docker tag pulami/nepai-backend:latest pulami/nepai-backend:${GITHUB_SHA}
          docker push pulami/nepai-backend:latest
          docker push pulami/nepai-backend:${GITHUB_SHA}

  build-frontend:
    runs-on: [self-hosted]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend
        run: |
          cd frontend
          docker build -t pulami/nepai-frontend:latest .
          docker tag pulami/nepai-frontend:latest pulami/nepai-frontend:${GITHUB_SHA}
          docker push pulami/nepai-frontend:latest
          docker push pulami/nepai-frontend:${GITHUB_SHA}

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: [self-hosted]
    steps:
      - name: Deploy Backend
        run: |
          kubectl set image deployment/nepai-backend \
            nepai-backend=pulami/nepai-backend:${GITHUB_SHA} -n nepai
          kubectl rollout status deployment/nepai-backend -n nepai

      - name: Deploy Frontend
        run: |
          kubectl set image deployment/nepai-frontend \
            nepai-frontend=pulami/nepai-frontend:${GITHUB_SHA} -n nepai
          kubectl rollout status deployment/nepai-frontend -n nepai

      - name: Deployment Complete
        run: echo "🚀 NEPAI DEPLOYED SUCCESSFULLY SHA=${GITHUB_SHA}"
